    <!-- Contact Section -->
    <section>
      <h1> Contact Us </h1>
      <p> If you have any questions or feedback, please send us a message below. </p>

      <!-- Contact Form -->
      <form>

        <!--Name -->
        <lable for="name"> Full Name:</lable><br>
        <input type="text" id="name" name="name" placeholder="Enter your name" required><br><br>

        <!-- Email -->
        <lable for="email"> Email Address:</lable><br>
        <input type="email" id="email" name="email" placeholder="Enter your email" required><br><br>

        <!-- Subject -->
        <lable for="subject"> Subject:</lable><br>
        <input type="text" id="subject" name="subject" placeholder="Enter subject" required><br><br>

        <!-- Message -->
        <lable for="message"> Message:</lable><br>
        <textarea type="message" id="message" name="name" placeholder="Write your message here..." required></textarea><br><br>

        <!-- Submit -->
        <button type="submit"> Send Message </button>
      </form>
    </section>

    <!-- Footer -->
    <footer>
